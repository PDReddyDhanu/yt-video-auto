<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Project fonts directory with Noto Sans Telugu -->
  <dir>C:/Users/dpala/OneDrive/Desktop/auto-video/backend/fonts</dir>
  <!-- Windows user fonts directory -->
  <dir>C:/Users/dpala/AppData/Local/Microsoft/Windows/Fonts</dir>
  <!-- System-wide Windows Fonts directory -->
  <dir>C:/Windows/Fonts</dir>
  <cachedir>C:/Users/dpala/OneDrive/Desktop/auto-video/backend/fonts/cache</cachedir>
  <match target="font">
    <edit name="antialias" mode="assign"><bool>true</bool></edit>
    <edit name="hinting"   mode="assign"><bool>true</bool></edit>
    <edit name="hintstyle" mode="assign"><const>hintslight</const></edit>
    <edit name="rgba"      mode="assign"><const>rgb</const></edit>
    <edit name="lcdfilter" mode="assign"><const>lcddefault</const></edit>
  </match>
</fontconfig>